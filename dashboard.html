<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Barbearia Willians</title>
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="preconnect"
  href="https://fonts.googleapis.com">
  <link rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
  rel="stylesheet">
<style>
.fa-bars {
  display: none !important;
}
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Poppins",sans-serif;
}
body{
  min-height:100vh;
  color:white;
  overflow-x:hidden;
  background:
  radial-gradient(
  circle at top left,
  rgba(212,175,55,0.08),
  transparent 30%
  ),
  radial-gradient(
  circle at bottom right,
  rgba(212,175,55,0.05),
  transparent 30%
  ),
  linear-gradient(
  180deg,
  #05070d,
  #0b1220,
  #050505
  );
}

.top-nav{
  width:100%;
  height:90px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 25px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}
.logo{
  color:#d4af37;
  font-size:1.5rem;
  font-weight:600;
  letter-spacing:2px;
  text-align: center !important;
}
.top-nav i{
  font-size:1.7rem;
  color:white;
}
.menu{
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:20px 0;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.menu-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  color:#a7a7a7;
  position:relative;
}
.menu-item.active{
  color:#d4af37;
}
.menu-item.active::after{
  content:"";
  width:100%;
  height:3px;
  background:#d4af37;
  position:absolute;
  bottom:-20px;
  border-radius:999px;
}
.menu-item i{
  font-size:1.8rem;
}
.menu-item span{
  font-size:0.85rem;
}
/* CONTAINER */
.container{
  padding:25px;
}
.title{
  color:#d4af37;
  font-size:1.8rem;
  margin-bottom:25px;
}
.summary{
  display:grid;
  grid-template-columns:
  repeat(3,1fr);
  gap:15px;
  margin-bottom:35px;
}

.card{

  background:
  rgba(255,255,255,0.03);

  border:
  1px solid rgba(255,255,255,0.05);

  border-radius:25px;

  padding:25px 15px;

  text-align:center;

  backdrop-filter:blur(12px);

  box-shadow:
  0 0 30px rgba(0,0,0,0.4);
}

.card i{

  font-size:2rem;

  color:#d4af37;

  margin-bottom:15px;
}

.card h2{

  font-size:2.3rem;
}

.card p{

  color:#cfcfcf;

  font-size:0.9rem;
}

/* HEADER AGENDA */

.header-agenda{

  display:flex;

  align-items:center;

  justify-content:space-between;

  margin-bottom:20px;
}

.btn-agenda{

  padding:12px 18px;

  border-radius:14px;

  border:
  1px solid rgba(212,175,55,0.5);

  background:transparent;

  color:#d4af37;

  font-weight:600;
}

/* LISTA */

.lista{

  display:flex;

  flex-direction:column;

  gap:18px;
}

.item{

  width:100%;

  padding:18px;

  border-radius:24px;

  background:
  rgba(255,255,255,0.03);

  border:
  1px solid rgba(255,255,255,0.05);

  display:flex;

  align-items:center;

  justify-content:space-between;

  backdrop-filter:blur(12px);
}

.left{

  display:flex;

  align-items:center;

  gap:15px;
}

.barra{

  width:4px;
  height:70px;

  border-radius:999px;

  background:#d4af37;
}

.avatar{

  width:60px;
  height:60px;

  border-radius:50%;

  background:
  rgba(255,255,255,0.05);

  display:flex;

  align-items:center;
  justify-content:center;
}

.avatar i{

  color:#d4af37;

  font-size:1.6rem;
}

.info h3{

  font-size:1.2rem;
}

.info p{

  color:#cfcfcf;
}

.horario{

  color:#d4af37;

  font-weight:600;

  display:flex;

  align-items:center;

  gap:8px;
}

/* BOTAO */

.btn-main{

  width:100%;

  height:70px;

  border:none;

  border-radius:999px;

  margin-top:35px;

  background:#d4af37;

  color:black;

  font-size:1.2rem;
  font-weight:700;

  display:flex;

  align-items:center;
  justify-content:center;

  gap:12px;
}

/* RESPONSIVO */

@media(max-width:768px){

  .summary{

    grid-template-columns:1fr;
  }

  .header-agenda{

    flex-direction:column;

    align-items:flex-start;

    gap:15px;
  }

  .item{

    flex-direction:column;

    align-items:flex-start;

    gap:20px;
  }

}
.del-user {
  background: transparent;

  border: 1px solid rgba(255, 70, 70, 0.7);

  color: rgba(255, 70, 70, 0.9);

  padding: 10px 18px;

  border-radius: 12px;

  font-size: 0.9rem;

  font-weight: 600;

  cursor: pointer;

  transition: 0.25s ease;
  
  backdrop-filter: blur(5px);
}
.del-user:hover {
  background: rgba(255, 70, 70, 0.12);

  border-color: rgba(255, 70, 70, 1);

  color: white;

  transform: scale(1.03);
}
.del-user:active {
  transform: scale(0.97);
}
.alt-status {
  background: transparent;

  border: 1px solid rgba(0, 255, 140, 0.6);

  color: rgba(0, 255, 140, 0.9);

  padding: 10px 18px;

  border-radius: 12px;

  font-size: 0.9rem;

  font-weight: 600;

  cursor: pointer;

  transition: 0.25s ease;

  backdrop-filter: blur(5px);

}
.alt-status:hover {
  background: rgba(0, 255, 140, 0.12);

  border-color: rgba(0, 255, 140, 1);

  color: white;

  transform: scale(1.03);
}
.alt-status:active {
  transform: scale(0.97);
}
.acoes {
  display: flex;
  gap: 12px;
  margin-top: -50px;
  margin-left: 120px;
}
.atendido{
  opacity: 0.5;
  border: 2px solid #00ff88;
}
.atrasado{
  border: 2px solid #ffb300;
  box-shadow: 0 0 20px rgba(255,179,0,0.2);
}
</style>
</head>
<body>

<!-- NAV -->

<div class="top-nav">

  <i class="fa-solid fa-bars"></i>

  <div class="logo">
    BARBEARIA WILLIAN'S
  </div>

  

</div>

<!-- MENU -->

<div class="menu">

  <div class="menu-item active" id="btnAgenda">
    <i class="fa-regular fa-calendar"></i>
    <span>AGENDA</span>
  </div>

  <div class="menu-item" id="btnClientes">
    <i class="fa-solid fa-users"></i>
    <span>CLIENTES</span>
  </div>

  <!--<div class="menu-item">
    <!--<i class="fa-solid fa-scissors"></i>
    <!--<span>SERVIÇOS</span>
  <!--</div>-->

</div>
<div id="agenda"></div>
<div class="container">

  <!-- RESUMO -->
  <h1 class="title">
    RESUMO MENSAL
  </h1>

  <div class="summary">

    <div class="card">

      <i class="fa-regular fa-calendar"></i>

      <h2><span id="agendados"></span></h2>

      <p>
        Agendamentos este mês
      </p>

    </div>

    <div class="card">

      <i class="fa-solid fa-users"></i>

      <h2><span id="atendidos"></span></h2>

      <p>
        Clientes atendidos
      </p>

    </div>

    

  </div>

  <!-- HEADER -->

  <div class="header-agenda">

    <h1 class="title">
      AGENDA DO MÊS
    </h1>


  </div>

  <!-- Lista de agendamentos -->
<div id="clientes"></div>
 <div class="lista" id="listaAgenda"></div>

  

  

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="agenda.js"></script>
</body>
</html>
